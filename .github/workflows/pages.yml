name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A50A84: ${{ secrets.A50A84 }}
          BF35F6: ${{ secrets.BF35F6 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('A50A84', '')
          tag_b = os.environ.get('BF35F6', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- 07186e091f8e2ad18ea92a9990a7353201b23708f4acca -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- 7d2af4b4aa22e0c1fa -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
